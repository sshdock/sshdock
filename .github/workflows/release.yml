name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        arch:
          - amd64
          - arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux binaries
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist/sshdock_${{ github.ref_name }}_linux_${{ matrix.arch }}
          go build -ldflags "-X github.com/sshdock/sshdock/internal/version.value=${{ github.ref_name }}" -o dist/sshdock_${{ github.ref_name }}_linux_${{ matrix.arch }}/sshdock ./cmd/sshdock
          go build -ldflags "-X github.com/sshdock/sshdock/internal/version.value=${{ github.ref_name }}" -o dist/sshdock_${{ github.ref_name }}_linux_${{ matrix.arch }}/sshdockd ./cmd/sshdockd
          tar -C dist/sshdock_${{ github.ref_name }}_linux_${{ matrix.arch }} -czf dist/sshdock_${{ github.ref_name }}_linux_${{ matrix.arch }}.tar.gz sshdock sshdockd

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sshdock_${{ github.ref_name }}_linux_${{ matrix.arch }}.tar.gz
          prerelease: ${{ contains(github.ref_name, '-rc.') }}
