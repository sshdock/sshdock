services:
  web:
    build:
      context: .
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY:?set APP_KEY with sshdock config set}
      APP_URL: ${APP_URL:-https://laravel.example.com}
      ASSET_URL: ${APP_URL:-https://laravel.example.com}
      LOG_CHANNEL: stderr
      LOG_LEVEL: info
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/storage/database.sqlite
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
    ports:
      - "127.0.0.1:18102:8080"
    volumes:
      - laravel_storage:/app/storage
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "php",
          "-r",
          "exit(@file_get_contents('http://127.0.0.1:8080/up') === false ? 1 : 0);",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

volumes:
  laravel_storage:
