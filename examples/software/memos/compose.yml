services:
  web:
    image: neosmemo/memos:0.29.1@sha256:3e1253477066eb2aefa91145f7f9038bb931ed88c8a3ee05310a933594cdba7d
    ports:
      - "127.0.0.1:18203:5230"
    environment:
      MEMOS_INSTANCE_URL: ${MEMOS_INSTANCE_URL:?set MEMOS_INSTANCE_URL with SSHDock config}
    volumes:
      - memos-data:/var/opt/memos
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:5230/"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

volumes:
  memos-data:
