<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SSHDock Static Site OK</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f7f4;
        color: #18201c;
      }

      main {
        width: min(640px, calc(100vw - 48px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 1;
      }

      p {
        margin: 0;
        font-size: 1.125rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SSHDock static site OK</h1>
      <p>This page is served by nginx from a Compose app deployed through SSHDock.</p>
    </main>
  </body>
</html>
